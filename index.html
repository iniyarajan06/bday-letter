<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Happy Birthday Priya</title>

    <!-- Google fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;700&family=Great+Vibes&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <!-- Intro overlay -->
    <section id="introOverlay" class="intro-overlay">
      <div class="intro-content">
        <p class="intro-title">Hey Priya 💛</p>
        <p class="intro-text">I made something for you…</p>
        <p class="intro-text">Not a big gift,</p>
        <p class="intro-text">but something from my heart.</p>
        <p class="intro-text intro-bottom">
          Click below to open it 🎁
        </p>

        <button id="openLetterBtn" class="open-btn" type="button">
          <span class="btn-label">Open</span>
        </button>
      </div>
    </section>

    <!-- floating hearts -->
    <div class="hearts">
      <span class="heart"></span>
      <span class="heart"></span>
      <span class="heart"></span>
      <span class="heart"></span>
      <span class="heart"></span>
      <span class="heart"></span>
      <span class="heart"></span>
      <span class="heart"></span>
    </div>

    <main class="page-wrap">

      <!-- Birthday Card -->
      <article id="birthdayCard" class="card">

        <header class="card-header">
          <h1 class="glow-title">
            Happy Birthday Priya 💛
          </h1>

          <p class="subtitle">
            A little letter from Iniya
          </p>
        </header>

        

        <!-- Letter text -->
        <section class="letter-body">
          <pre id="typedLetter" class="typed-letter"></pre>
        </section>

      </article>

    </main>

    <!-- Music -->
    <audio id="birthdayMusic" preload="auto" loop>
      <source src="music.mp3" type="audio/mpeg" />
    </audio>

    <!-- Confetti -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>

    <script src="script.js"></script>

  </body>
</html>
